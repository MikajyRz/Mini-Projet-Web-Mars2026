server {
    listen 80;
    server_name localhost;

    root /var/www/html/public;
    index index.php index.html;

    # Activer la compression Gzip (Recommandation Lighthouse)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache pour les fichiers statiques (CSS, WebP, etc.)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public";
    }

    # Accès spécifique au dossier /uploads
    location /uploads/ {
        try_files $uri $uri/ =404;
        expires 1y;
        add_header Cache-Control "public";
    }

    # =========================================
    # URL REWRITING (Réécriture d'URL)
    # =========================================

    # Règle 1 : Pages fixes BackOffice et site
    rewrite "^/login/?$"      /index.php?page=login last;
    rewrite "^/logout/?$"     /index.php?page=logout last;
    rewrite "^/dashboard/?$"  /index.php?page=dashboard last;
    rewrite "^/add/?$"        /index.php?page=add last;
    rewrite "^/edit/?$"       /index.php?page=edit&id=$arg_id last;
    rewrite "^/delete/?$"     /index.php?page=delete&id=$arg_id last;
    rewrite "^/save/?$"       /index.php?page=save last;
    rewrite "^/upload/?$"     /index.php?page=upload last;

    # Règle 2 : Article avec URL propre
    # /{categorie}/article/{date}/{slug}
    # On capture le dernier segment comme slug
    rewrite "^/[^/]+/article/[0-9-]+/([^/]+)/?$" "/index.php?page=article&slug=$1" last;

    # Règle 3 : Page catégorie
    # On traite n'importe quel segment simple qui n'est pas un fichier réel
    location / {
        # S'il y a un point dans le segment final, c'est probablement un fichier (index.php, style.css)
        # S'il y a un slash, ce n'est plus un segment simple
        if (!-e $request_filename) {
            # On vérifie que le segment ne contient pas de point (pas un fichier .php ou .css)
            rewrite "^/([^/.]+)/?$" /index.php?page=home&category=$1 last;
        }
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }
}